<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestiónPro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:#fff;border-right:1px solid #e8e8e5;display:flex;flex-direction:column;padding:12px 0}
.logo{padding:14px 18px 18px;font-size:16px;font-weight:600;border-bottom:1px solid #e8e8e5;margin-bottom:8px;color:#1a1a1a}
.logo span{font-size:11px;color:#888;display:block;font-weight:400;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;font-size:13px;color:#666;transition:background 0.1s;border-left:3px solid transparent}
.nav-item:hover{background:#f5f5f3;color:#1a1a1a}
.nav-item.active{background:#f0faf6;color:#0F6E56;font-weight:500;border-left-color:#1D9E75}
.nav-item svg{width:17px;height:17px;flex-shrink:0}
.nav-section{font-size:10px;color:#aaa;padding:12px 18px 4px;text-transform:uppercase;letter-spacing:0.08em}
.user-box{margin-top:auto;padding:12px 18px;border-top:1px solid #e8e8e5}
.user-box select{width:100%;font-size:12px;background:#f5f5f3;border:1px solid #e0e0dc;border-radius:8px;padding:7px 10px;color:#1a1a1a;cursor:pointer}
.user-label{font-size:11px;color:#888;margin-bottom:5px}
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e8e8e5;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:16px;font-weight:600}
.content{padding:22px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid #d0d0cc;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#1a1a1a;font-family:inherit;transition:all 0.1s}
.btn:hover{background:#f5f5f3;border-color:#b0b0aa}
.btn-primary{background:#1D9E75;border-color:#1D9E75;color:#fff}
.btn-primary:hover{background:#0F6E56;border-color:#0F6E56}
.btn-danger{color:#c0392b;border-color:#e8c0bd}
.btn-danger:hover{background:#fdf0ef}
.btn-sm{padding:5px 12px;font-size:12px}
.card{background:#fff;border:1px solid #e8e8e5;border-radius:12px;padding:18px;margin-bottom:18px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.metric{background:#f5f5f3;border-radius:10px;padding:14px}
.metric-label{font-size:11px;color:#888;margin-bottom:5px}
.metric-value{font-size:24px;font-weight:600}
.green{color:#0F6E56}
.red{color:#c0392b}
.amber{color:#854F0B}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 11px;font-weight:500;font-size:11px;color:#888;border-bottom:1px solid #e8e8e5;text-transform:uppercase;letter-spacing:0.05em}
td{padding:9px 11px;border-bottom:1px solid #f0f0ee;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500}
.badge-green{background:#E1F5EE;color:#0F6E56}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEAEA;color:#a32d2d}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-gray{background:#F1EFE8;color:#5F5E5A}
input,select,textarea{font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff;border:1px solid #d0d0cc;border-radius:8px;padding:8px 11px;width:100%;transition:border-color 0.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,0.1)}
label{font-size:12px;color:#666;margin-bottom:5px;display:block}
.form-row{display:grid;gap:14px;margin-bottom:14px}
.form-row.cols-2{grid-template-columns:1fr 1fr}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.section-title{font-size:14px;font-weight:600;margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid #e8e8e5}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:#fff;border-radius:14px;padding:22px;width:640px;max-width:100%;max-height:90vh;overflow:auto;box-shadow:0 8px 32px rgba(0,0,0,0.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-header h2{font-size:16px;font-weight:600}
.tabs{display:flex;border-bottom:1px solid #e8e8e5;margin-bottom:18px}
.tab{padding:9px 18px;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.1s}
.tab:hover{color:#1a1a1a}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75;font-weight:500}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.alert{padding:11px 15px;border-radius:9px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px}
.alert-warning{background:#FAEEDA;color:#854F0B;border:1px solid #F5C97A}
.alert-success{background:#E1F5EE;color:#0F6E56;border:1px solid #9FE1CB}
.alert-info{background:#E6F1FB;color:#185FA5;border:1px solid #B5D4F4}
.divider{border:none;border-top:1px solid #e8e8e5;margin:18px 0}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.items-table{border:1px solid #e8e8e5;border-radius:9px;overflow:hidden;margin-bottom:10px}
.total-row{font-size:14px;font-weight:600;text-align:right;padding:10px 11px 0}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid #e0e0dc;border-top-color:#1D9E75;border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:14px;color:#888;font-size:13px}
.toast{position:fixed;bottom:22px;right:22px;background:#fff;border:1px solid #e0e0dc;border-left-width:4px;border-radius:9px;padding:11px 18px;font-size:13px;max-width:340px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.1);animation:slideIn 0.2s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.stock-low{color:#c0392b;font-weight:500}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="logo">GestiónPro<span>Sistema de gestión</span></div>
    <div id="nav"></div>
    <div class="user-box">
      <div class="user-label">Usuario activo</div>
      <select id="userSelect" onchange="changeUser(this.value)">
        <option value="super">Superusuario</option>
        <option value="admin">Administración</option>
        <option value="pedidos">Pedidos</option>
        <option value="stock">Stock</option>
        <option value="costos">Costos</option>
      </select>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
      <div class="flex" id="topActions"></div>
    </div>
    <div class="content" id="content">
      <div class="loading-screen"><div class="spinner"></div>Cargando datos...</div>
    </div>
  </div>
</div>
<div id="modalContainer"></div>

<script>
const API = '';
let DB = { clientes:[], pedidos:[], productos:[], insumos:[], pagos:[] };
let currentUser = 'super';
let currentPage = 'dashboard';

const ROLES = {
  super:   { pages:['dashboard','pedidos','administracion','stock','costos'] },
  admin:   { pages:['dashboard','pedidos','administracion'] },
  pedidos: { pages:['pedidos'] },
  stock:   { pages:['stock'] },
  costos:  { pages:['costos'] },
};
const PAGES = {
  dashboard:      { label:'Dashboard', icon:'grid' },
  pedidos:        { label:'Pedidos', icon:'list' },
  administracion: { label:'Administración', icon:'bank' },
  stock:          { label:'Stock', icon:'box' },
  costos:         { label:'Costos', icon:'calc' },
};
const ICONS = {
  grid: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>`,
  list: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>`,
  bank: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 10v11M12 10v11M16 10v11"/></svg>`,
  box:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
  calc: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="12" x2="10" y2="12"/><line x1="14" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="10" y2="16"/><line x1="14" y1="16" x2="16" y2="16"/></svg>`,
};

async function apiFetch(url, opts={}) {
  const res = await fetch(API + url, {
    headers: {'Content-Type':'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function loadAll() {
  try {
    const [clientes, pedidos, productos, insumos, pagos] = await Promise.all([
      apiFetch('/api/clientes'),
      apiFetch('/api/pedidos'),
      apiFetch('/api/productos'),
      apiFetch('/api/insumos'),
      apiFetch('/api/pagos'),
    ]);
    DB = { clientes, pedidos, productos, insumos, pagos };
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading-screen" style="color:#c0392b">Error al conectar con el servidor.<br><small>${e.message}</small></div>`;
  }
}

function getCliente(id) { return DB.clientes.find(c=>c.id===id); }
function getProducto(id) { return DB.productos.find(p=>p.id===id); }
function getInsumo(id) { return DB.insumos.find(i=>i.id===id); }
function pedidoTotal(p) { return (p.items||[]).reduce((s,i)=>s+i.qty*i.precio,0); }
function fmt(n) { return Number(n||0).toLocaleString('es-AR',{style:'currency',currency:'ARS',minimumFractionDigits:0}); }
function fmtN(n) { return Number(n||0).toLocaleString('es-AR'); }
function today() { return new Date().toISOString().slice(0,10); }

function showModal(html) {
  document.getElementById('modalContainer').innerHTML =
    `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML=''; }

function showToast(msg, type='info') {
  const colors = {success:'#1D9E75',warning:'#BA7517',info:'#185FA5',error:'#c0392b'};
  const t = document.createElement('div');
  t.className='toast';
  t.style.borderLeftColor = colors[type]||colors.info;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function changeUser(u) {
  currentUser = u;
  const pages = ROLES[u].pages;
  if (!pages.includes(currentPage)) currentPage = pages[0];
  render();
}
function nav(page) { currentPage = page; render(); }

function badgeEstado(e) {
  const m={pendiente:'badge-gray',en_proceso:'badge-amber',confirmado:'badge-green',entregado:'badge-blue',cancelado:'badge-red'};
  const l={pendiente:'Pendiente',en_proceso:'En proceso',confirmado:'Confirmado',entregado:'Entregado',cancelado:'Cancelado'};
  return `<span class="badge ${m[e]||'badge-gray'}">${l[e]||e}</span>`;
}

function render() {
  renderNav();
  document.getElementById('pageTitle').textContent = PAGES[currentPage].label;
  document.getElementById('topActions').innerHTML = topActions();
  const fn = {dashboard:pageDashboard, pedidos:pagePedidos, administracion:pageAdmin, stock:pageStock, costos:pageCostos}[currentPage];
  document.getElementById('content').innerHTML = fn ? fn() : '';
}

function renderNav() {
  const pages = ROLES[currentUser].pages;
  document.getElementById('nav').innerHTML = pages.map(p =>
    `<div class="nav-item${currentPage===p?' active':''}" onclick="nav('${p}')">${ICONS[PAGES[p].icon]}${PAGES[p].label}</div>`
  ).join('');
}

function topActions() {
  const u=currentUser, p=currentPage;
  if(p==='pedidos') return `<button class="btn btn-primary btn-sm" onclick="modalNuevoPedido()">+ Nuevo pedido</button>`;
  if(p==='administracion') return `<button class="btn btn-sm" onclick="modalNuevoCliente()">+ Nuevo cliente</button>`;
  if(p==='stock') return `<button class="btn btn-sm" onclick="modalAjusteStock()">Ajustar stock</button>`;
  if(p==='costos') return `<button class="btn btn-primary btn-sm" onclick="modalNuevoInsumo()">+ Nuevo insumo</button>`;
  return '';
}

// ── DASHBOARD ──
function pageDashboard() {
  const deuda = DB.clientes.reduce((s,c)=>s+Math.abs(Math.min(c.saldo,0)),0);
  const pend = DB.pedidos.filter(p=>p.estado==='pendiente').length;
  const proc = DB.pedidos.filter(p=>p.estado==='en_proceso').length;
  const bajo = DB.insumos.filter(i=>i.stock<=i.minimo).length;
  return `
  <div class="grid-4" style="margin-bottom:18px">
    <div class="metric"><div class="metric-label">Deuda total clientes</div><div class="metric-value red">${fmt(deuda)}</div></div>
    <div class="metric"><div class="metric-label">Pedidos pendientes</div><div class="metric-value amber">${pend}</div></div>
    <div class="metric"><div class="metric-label">En proceso</div><div class="metric-value">${proc}</div></div>
    <div class="metric"><div class="metric-label">Insumos bajo mínimo</div><div class="metric-value ${bajo>0?'red':'green'}">${bajo}</div></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div class="section-title">Últimos pedidos</div>
      <table><thead><tr><th>N°</th><th>Cliente</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>
      ${DB.pedidos.slice(0,8).map(p=>`<tr>
        <td><strong>#${p.id}</strong></td><td>${p.cliente_nombre||'—'}</td>
        <td>${badgeEstado(p.estado)}</td><td>${p.fecha}</td>
      </tr>`).join('')}
      </tbody></table>
    </div>
    <div class="card">
      <div class="section-title">Alertas de stock</div>
      ${DB.insumos.filter(i=>i.stock<=i.minimo).length===0
        ? '<div class="empty">Todo el stock en niveles normales ✓</div>'
        : DB.insumos.filter(i=>i.stock<=i.minimo).map(i=>`
          <div class="alert alert-warning">⚠ <div><strong>${i.nombre}</strong>: stock ${fmtN(i.stock)} ${i.unidad} — mínimo ${fmtN(i.minimo)}</div></div>`).join('')}
    </div>
  </div>`;
}

// ── PEDIDOS ──
function pagePedidos() {
  const showP = currentUser==='super'||currentUser==='admin';
  return `<div class="card">
    <div class="section-title">Pedidos</div>
    ${DB.pedidos.length===0?'<div class="empty">Sin pedidos registrados</div>':''}
    <table><thead><tr><th>N°</th><th>Cliente</th><th>Fecha</th>${showP?'<th>Total</th>':''}<th>Estado</th><th>Acciones</th></tr></thead><tbody>
    ${DB.pedidos.map(p=>`<tr>
      <td><strong>#${p.id}</strong></td>
      <td>${p.cliente_nombre||'—'}</td>
      <td>${p.fecha}</td>
      ${showP?`<td>${fmt(pedidoTotal(p))}</td>`:''}
      <td>${badgeEstado(p.estado)}</td>
      <td><div class="flex">
        <button class="btn btn-sm" onclick="verPedido(${p.id})">Ver</button>
        ${p.estado==='pendiente'?`<button class="btn btn-sm" onclick="cambiarEstadoPedido(${p.id},'en_proceso')">▶ Iniciar</button>`:''}
        ${p.estado==='en_proceso'?`<button class="btn btn-primary btn-sm" onclick="cambiarEstadoPedido(${p.id},'confirmado')">✓ Confirmar</button>`:''}
      </div></td>
    </tr>`).join('')}
    </tbody></table>
  </div>`;
}

function verPedido(id) {
  const p = DB.pedidos.find(x=>x.id===id); if(!p) return;
  const showP = currentUser==='super'||currentUser==='admin';
  showModal(`
    <div class="modal-header"><h2>Pedido #${p.id}</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row cols-2">
      <div><label>Cliente</label><strong>${p.cliente_nombre||'—'}</strong></div>
      <div><label>Fecha</label><div>${p.fecha}</div></div>
    </div>
    <div style="margin-bottom:14px"><label>Estado</label>${badgeEstado(p.estado)}</div>
    ${p.notas?`<div style="margin-bottom:14px"><label>Notas</label><div>${p.notas}</div></div>`:''}
    <hr class="divider">
    <div class="section-title">Ítems del pedido</div>
    <div class="items-table"><table>
      <thead><tr><th>Listo</th><th>Producto</th><th>Cant.</th>${showP?'<th>Precio</th><th>Subtotal</th>':''}</tr></thead>
      <tbody>${(p.items||[]).map(it=>`<tr>
        <td><input type="checkbox" ${it.marcado?'checked':''} onchange="marcarItemPedido(${p.id},${it.id},this.checked)"></td>
        <td>${it.nombre}</td><td>${fmtN(it.qty)}</td>
        ${showP?`<td>${fmt(it.precio)}</td><td>${fmt(it.qty*it.precio)}</td>`:''}
      </tr>`).join('')}</tbody>
    </table></div>
    ${showP?`<div class="total-row">Total: ${fmt(pedidoTotal(p))}</div>`:''}
    <hr class="divider">
    <div class="flex" style="justify-content:flex-end;gap:8px">
      ${p.estado==='pendiente'?`<button class="btn btn-sm" onclick="cambiarEstadoPedidoClose(${p.id},'en_proceso')">▶ Iniciar proceso</button>`:''}
      ${p.estado==='en_proceso'?`<button class="btn btn-primary btn-sm" onclick="cambiarEstadoPedidoClose(${p.id},'confirmado')">✓ Confirmar y pasar a cuenta corriente</button>`:''}
    </div>`);
}

async function marcarItemPedido(pedidoId, itemId, marcado) {
  try {
    await apiFetch(`/api/pedidos/${pedidoId}/marcar_item`, {method:'PUT', body:{item_id:itemId, marcado}});
    const p = DB.pedidos.find(x=>x.id===pedidoId);
    if(p){ const it=p.items.find(i=>i.id===itemId); if(it) it.marcado=marcado?1:0; }
  } catch(e) { showToast('Error al guardar','error'); }
}

async function cambiarEstadoPedido(id, estado) {
  try {
    await apiFetch(`/api/pedidos/${id}/estado`, {method:'PUT', body:{estado}});
    await loadAll();
    const msgs = {en_proceso:'Pedido iniciado', confirmado:'Pedido confirmado y cargado a cuenta corriente'};
    showToast(msgs[estado]||'Estado actualizado', 'success');
  } catch(e) { showToast('Error al actualizar','error'); }
}
async function cambiarEstadoPedidoClose(id, estado) {
  closeModal();
  await cambiarEstadoPedido(id, estado);
}

function modalNuevoPedido() {
  const clOpts = DB.clientes.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  const prOpts = DB.productos.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join('');
  if(!DB.clientes.length||!DB.productos.length){showToast('Necesitás al menos un cliente y un producto','warning');return;}
  showModal(`
    <div class="modal-header"><h2>Nuevo pedido</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row cols-2">
      <div><label>Cliente</label><select id="np_cl">${clOpts}</select></div>
      <div><label>Fecha</label><input type="date" id="np_fecha" value="${today()}"></div>
    </div>
    <div class="form-row"><label>Notas</label><input type="text" id="np_notas" placeholder="Observaciones..."></div>
    <hr class="divider">
    <div class="section-title">Ítems</div>
    <div id="np_items"></div>
    <div class="form-row cols-3" style="margin-top:10px">
      <select id="np_prod">${prOpts}</select>
      <input type="number" id="np_qty" min="1" value="1">
      <button class="btn btn-sm" onclick="addItemNP()">+ Agregar</button>
    </div>
    <div id="np_total" style="text-align:right;font-size:13px;margin-top:10px;color:#888"></div>
    <hr class="divider">
    <div style="text-align:right"><button class="btn btn-primary" onclick="guardarPedido()">Guardar pedido</button></div>`);
  window._npItems = [];
  renderNPItems();
}

function renderNPItems() {
  const showP = currentUser==='super'||currentUser==='admin';
  document.getElementById('np_items').innerHTML = window._npItems.length
    ? window._npItems.map((it,i)=>`<div class="flex-between" style="padding:7px 0;border-bottom:1px solid #f0f0ee">
        <span>${it.nombre} × ${it.qty}</span>
        <div class="flex">${showP?`<span>${fmt(it.qty*it.precio)}</span>`:''}<button class="btn btn-sm btn-danger" onclick="removeItemNP(${i})">✕</button></div>
      </div>`).join('')
    : '<div style="color:#aaa;font-size:12px;padding:8px 0">Sin ítems — agregá productos arriba</div>';
  if(showP){
    const t=window._npItems.reduce((s,i)=>s+i.qty*i.precio,0);
    document.getElementById('np_total').textContent=window._npItems.length?`Total: ${fmt(t)}`:'';
  }
}

function addItemNP() {
  const pid=parseInt(document.getElementById('np_prod').value);
  const qty=parseInt(document.getElementById('np_qty').value)||1;
  const prod=getProducto(pid); if(!prod)return;
  const ex=window._npItems.find(i=>i.producto_id===pid);
  if(ex){ex.qty+=qty;}else{window._npItems.push({producto_id:pid,nombre:prod.nombre,qty,precio:prod.precio});}
  renderNPItems();
}
function removeItemNP(i){window._npItems.splice(i,1);renderNPItems();}

async function guardarPedido() {
  if(!window._npItems.length){showToast('Agregá al menos un ítem','warning');return;}
  try {
    await apiFetch('/api/pedidos',{method:'POST',body:{
      cliente_id:parseInt(document.getElementById('np_cl').value),
      fecha:document.getElementById('np_fecha').value,
      notas:document.getElementById('np_notas').value,
      items:window._npItems
    }});
    await loadAll();
    closeModal();
    showToast('Pedido creado correctamente','success');
  } catch(e){ showToast('Error al guardar','error'); }
}

          <button class="btn btn-sm" onclick="enviarCC(${c.id},'wp')" title="WhatsApp">WA</button>
        </div></td>
      </tr>`).join('')}
      </tbody></table>
    </div>
    <div id="tab-pagos" style="display:none">

      <table><thead><tr><th>Cliente</th><th>Fecha</th><th>Monto</th><th>Método</th><th>Nota</th></tr></thead><tbody>
      ${DB.pagos.map(pg=>`<tr>

function adminTab(el,tabId) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['tab-cc','tab-pagos','tab-precios'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none';});
  const t=document.getElementById(tabId); if(t)t.style.display='';
}

async function verCC(cid) {
  try {
    const data = await apiFetch(`/api/clientes/${cid}/cc`);
    const cl=data.cliente; let saldo=0;
    showModal(`
      <div class="modal-header"><h2>Cuenta corriente — ${cl.nombre}</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
      <div class="form-row cols-3">
        <div><label>Email</label><div>${cl.email||'—'}</div></div>
        <div><label>Teléfono</label><div>${cl.tel||'—'}</div></div>
        <div><label>Saldo actual</label><div style="font-weight:600;color:${cl.saldo<0?'#c0392b':'#0F6E56'}">${fmt(cl.saldo)}</div></div>
      </div>
      <hr class="divider">
      <table><thead><tr><th>Fecha</th><th>Descripción</th><th>Debe</th><th>Haber</th><th>Saldo</th></tr></thead><tbody>
      ${data.movimientos.length?data.movimientos.map(m=>{
        saldo-=m.debe; saldo+=m.haber;
        return `<tr>
          <td>${m.fecha}</td><td>${m.desc}</td>
          <td>${m.debe?`<span style="color:#c0392b">${fmt(m.debe)}</span>`:''}</td>
          <td>${m.haber?`<span style="color:#0F6E56">${fmt(m.haber)}</span>`:''}</td>
          <td style="font-weight:500;color:${saldo<0?'#c0392b':'#0F6E56'}">${fmt(saldo)}</td>
        </tr>`;
      }).join(''):`<tr><td colspan="5" class="empty">Sin movimientos</td></tr>`}
      </tbody></table>
      <hr class="divider">
      <div class="flex" style="justify-content:flex-end;gap:8px">
        <button class="btn btn-sm" onclick="enviarCC(${cid},'mail')">✉ Enviar por mail</button>
        <button class="btn btn-sm" onclick="enviarCC(${cid},'wp')">WA Enviar por WhatsApp</button>
      </div>`);
  } catch(e){ showToast('Error al cargar CC','error'); }
}

function enviarCC(cid, via) {
  const cl=getCliente(cid);
  if(via==='mail') showToast(`Se enviaría la CC de ${cl?.nombre} a ${cl?.email||'(sin email)'}`, 'info');
  else showToast(`Se abriría WhatsApp para ${cl?.nombre} (${cl?.tel||'sin teléfono'})`, 'info');
}

async function ingresarPago() {
  const cid=parseInt(document.getElementById('pago_cl').value);
  const monto=parseFloat(document.getElementById('pago_monto').value);
  if(!monto||monto<=0){showToast('Ingresá un monto válido','warning');return;}
  try {
    await apiFetch('/api/pagos',{method:'POST',body:{cliente_id:cid,monto,metodo:document.getElementById('pago_met').value,nota:document.getElementById('pago_nota').value}});
    await loadAll();
    showToast(`Pago de ${fmt(monto)} registrado`,'success');
  } catch(e){ showToast('Error al registrar pago','error'); }
}

async function guardarPrecios() {
  try {
    await Promise.all(DB.productos.map(p=>{
      const el=document.getElementById(`precio_${p.id}`);
      const precio=parseFloat(el?.value)||p.precio;
      return apiFetch(`/api/productos/${p.id}/precio`,{method:'PUT',body:{precio}});
    }));
    await loadAll();
    showToast('Precios actualizados','success');
  } catch(e){ showToast('Error al guardar precios','error'); }
}

// ── STOCK ──
function pageStock() {
  const bajos=DB.insumos.filter(i=>i.stock<=i.minimo);
  return `
    ${bajos.length?`<div class="alert alert-warning">⚠ <div><strong>${bajos.length} insumo${bajos.length>1?'s':''} bajo mínimo:</strong> ${bajos.map(i=>i.nombre).join(', ')}</div></div>`:''}
    <div class="card">
      <div class="section-title">Control de stock</div>
      ${DB.insumos.length===0?'<div class="empty">Sin insumos cargados</div>':''}
      <table><thead><tr><th>Insumo</th><th>Unidad</th><th>Stock actual</th><th>Mínimo</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>
      ${DB.insumos.map(i=>{
        const bajo=i.stock<=i.minimo;
        return `<tr>
          <td><strong>${i.nombre}</strong></td>
          <td>${i.unidad}</td>
          <td class="${bajo?'stock-low':''}">${fmtN(i.stock)}</td>
          <td>${fmtN(i.minimo)}</td>
          <td>${bajo?'<span class="badge badge-red">Bajo mínimo</span>':'<span class="badge badge-green">Normal</span>'}</td>
          <td><button class="btn btn-sm" onclick="modalEditStock(${i.id})">Editar</button></td>
        </tr>`;
      }).join('')}
      </tbody></table>
    </div>`;
}

function modalEditStock(id) {
  const ins=getInsumo(id);
  showModal(`
    <div class="modal-header"><h2>Editar — ${ins.nombre}</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row cols-2">
      <div><label>Stock actual (${ins.unidad})</label><input type="number" id="es_stock" value="${ins.stock}" step="0.1"></div>
      <div><label>Stock mínimo</label><input type="number" id="es_min" value="${ins.minimo}" step="0.1"></div>
    </div>
    <div style="text-align:right"><button class="btn btn-primary" onclick="guardarStock(${id})">Guardar</button></div>`);
}

async function guardarStock(id) {
  const ins=getInsumo(id);
  try {
    await apiFetch(`/api/insumos/${id}`,{method:'PUT',body:{...ins,stock:parseFloat(document.getElementById('es_stock').value)||0,minimo:parseFloat(document.getElementById('es_min').value)||0}});
    await loadAll();
    closeModal();
    showToast('Stock actualizado','success');
  } catch(e){ showToast('Error al guardar','error'); }
}

function modalAjusteStock() {
  showModal(`
    <div class="modal-header"><h2>Ajuste de stock</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row"><label>Insumo</label>
      <select id="aj_ins">${DB.insumos.map(i=>`<option value="${i.id}">${i.nombre} — actual: ${fmtN(i.stock)} ${i.unidad}</option>`).join('')}</select>
    </div>
    <div class="form-row cols-2">
      <div><label>Operación</label><select id="aj_op"><option value="1">Entrada (+)</option><option value="-1">Salida (−)</option></select></div>
      <div><label>Cantidad</label><input type="number" id="aj_qty" min="0" step="0.1" placeholder="0"></div>
    </div>
    <div style="text-align:right"><button class="btn btn-primary" onclick="guardarAjuste()">Aplicar</button></div>`);
}

async function guardarAjuste() {
  const iid=parseInt(document.getElementById('aj_ins').value);
  const signo=parseInt(document.getElementById('aj_op').value);
  const qty=(parseFloat(document.getElementById('aj_qty').value)||0)*signo;
  try {
    await apiFetch(`/api/insumos/${iid}/ajuste`,{method:'POST',body:{cantidad:qty}});
    await loadAll();
    closeModal();
    showToast('Stock ajustado','success');
  } catch(e){ showToast('Error al ajustar','error'); }
}

// ── COSTOS ──
function pageCostos() {
  const canEdit=currentUser==='super'||currentUser==='costos';
  return `<div class="grid-2">
    <div class="card">
      <div class="flex-between" style="margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid #e8e8e5">
        <span style="font-size:14px;font-weight:600">Insumos / materias primas</span>
        ${canEdit?`<button class="btn btn-sm" onclick="modalNuevoInsumo()">+ Nuevo</button>`:''}
      </div>
      <table><thead><tr><th>Insumo</th><th>Unidad</th><th>Costo unit.</th></tr></thead><tbody>
      ${DB.insumos.map(i=>`<tr>
        <td>${i.nombre}</td><td>${i.unidad}</td>
        <td>${fmt(i.costo)}${canEdit?`<input type="number" value="${i.costo}" style="width:100px;margin-left:8px" id="costo_${i.id}">`:''}</td>
      </tr>`).join('')}
      </tbody></table>
      ${canEdit?`<div style="margin-top:14px;text-align:right"><button class="btn btn-primary btn-sm" onclick="guardarCostos()">Guardar costos</button></div>`:''}
    </div>
    <div class="card">
      <div class="flex-between" style="margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid #e8e8e5">
        <span style="font-size:14px;font-weight:600">Productos — margen y costo</span>
        ${canEdit?`<button class="btn btn-sm" onclick="modalNuevoProducto()">+ Nuevo producto</button>`:''}
      </div>
      <table><thead><tr><th>Producto</th><th>Costo</th><th>Precio</th><th>Margen</th></tr></thead><tbody>
      ${DB.productos.map(p=>{
        const c=costoProd(p);
        const mg=p.precio>0?((p.precio-c)/p.precio*100).toFixed(1):0;
        return `<tr>
          <td><strong>${p.nombre}</strong><br>
            <span style="font-size:11px;color:#888">${(p.componentes||[]).map(comp=>`${comp.qty} ${comp.unidad} ${comp.insumo_nombre}`).join(' · ')}</span>
          </td>
          <td>${fmt(c)}</td><td>${fmt(p.precio)}</td>
          <td><span class="badge ${parseFloat(mg)>30?'badge-green':parseFloat(mg)>15?'badge-amber':'badge-red'}">${mg}%</span></td>
        </tr>`;
      }).join('')}
      </tbody></table>
    </div>
  </div>`;
}

function costoProd(prod) {
  return (prod.componentes||[]).reduce((s,c)=>s+(c.costo||0)*c.qty,0);
}

async function guardarCostos() {
  try {
    await Promise.all(DB.insumos.map(i=>{
      const el=document.getElementById(`costo_${i.id}`);
      const costo=parseFloat(el?.value)||i.costo;
      return apiFetch(`/api/insumos/${i.id}`,{method:'PUT',body:{...i,costo}});
    }));
    await loadAll();
    showToast('Costos actualizados','success');
  } catch(e){ showToast('Error al guardar','error'); }
}

function modalNuevoInsumo() {
  showModal(`
    <div class="modal-header"><h2>Nuevo insumo</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row"><label>Nombre</label><input id="ni_nom" placeholder="Ej: Madera, Tornillos, Pintura..."></div>
    <div class="form-row cols-3">
      <div><label>Costo unitario ($)</label><input type="number" id="ni_costo" placeholder="0" min="0"></div>
      <div><label>Stock inicial</label><input type="number" id="ni_stock" placeholder="0" min="0" step="0.1"></div>
      <div><label>Stock mínimo</label><input type="number" id="ni_min" placeholder="0" min="0" step="0.1"></div>
    </div>
    <div class="form-row"><label>Unidad de medida</label><input id="ni_unidad" placeholder="Ej: m², kg, lt, caja, unidad"></div>
    <div style="text-align:right"><button class="btn btn-primary" onclick="guardarInsumo()">Guardar</button></div>`);
}

async function guardarInsumo() {
  const nom=document.getElementById('ni_nom').value.trim();
  if(!nom){showToast('Ingresá un nombre','warning');return;}
  try {
    await apiFetch('/api/insumos',{method:'POST',body:{nombre:nom,costo:parseFloat(document.getElementById('ni_costo').value)||0,stock:parseFloat(document.getElementById('ni_stock').value)||0,minimo:parseFloat(document.getElementById('ni_min').value)||0,unidad:document.getElementById('ni_unidad').value||'unidad'}});
    await loadAll();
    closeModal();
    showToast('Insumo creado','success');
  } catch(e){ showToast('Error al crear','error'); }
}

function modalNuevoProducto() {
  const insOpts=DB.insumos.map(i=>`<option value="${i.id}">${i.nombre} (${i.unidad})</option>`).join('');
  if(!insOpts){showToast('Primero cargá insumos','warning');return;}
  showModal(`
    <div class="modal-header"><h2>Nuevo producto final</h2><button class="btn btn-sm" onclick="closeModal()">✕</button></div>
    <div class="form-row cols-2">
      <div><label>Nombre del producto</label><input id="np2_nom" placeholder="Nombre"></div>
      <div><label>Precio de venta ($)</label><input type="number" id="np2_precio" placeholder="0" min="0"></div>
    </div>
    <hr class="divider">
    <div class="section-title">Componentes (insumos que usa)</div>
    <div id="np2_comps"></div>
    <div class="form-row cols-3" style="margin-top:10px">
      <select id="np2_ins">${insOpts}</select>
      <input type="number" id="np2_qty" min="0.1" step="0.1" value="1">
      <button class="btn btn-sm" onclick="addCompNP2()">+ Agregar</button>
    </div>
    <div id="np2_costo" style="margin-top:10px;font-size:13px;color:#888"></div>
    <hr class="divider">
    <div style="text-align:right"><button class="btn btn-primary" onclick="guardarProducto()">Guardar producto</button></div>`);
  window._np2Comps=[];
  renderNP2Comps();
}

function renderNP2Comps() {
  document.getElementById('np2_comps').innerHTML = window._np2Comps.length
    ? window._np2Comps.map((c,i)=>{const ins=getInsumo(c.insumo_id);return `<div class="flex-between" style="padding:5px 0;border-bottom:1px solid #f0f0ee">
        <span>${ins?.nombre} × ${fmtN(c.qty)} ${ins?.unidad}</span>
        <div class="flex"><span>${fmt((ins?.costo||0)*c.qty)}</span><button class="btn btn-sm btn-danger" onclick="removeCompNP2(${i})">✕</button></div>
      </div>`;}).join('')
    : '<div style="font-size:12px;color:#aaa;padding:8px 0">Sin componentes aún</div>';
  const c=window._np2Comps.reduce((s,c)=>{const ins=getInsumo(c.insumo_id);return s+(ins?ins.costo*c.qty:0);},0);
  document.getElementById('np2_costo').textContent=window._np2Comps.length?`Costo de producción estimado: ${fmt(c)}`:'';
}

function addCompNP2(){
  const iid=parseInt(document.getElementById('np2_ins').value);
  const qty=parseFloat(document.getElementById('np2_qty').value)||1;
  const ex=window._np2Comps.find(c=>c.insumo_id===iid);
  if(ex){ex.qty+=qty;}else{window._np2Comps.push({insumo_id:iid,qty});}
  renderNP2Comps();
}
function removeCompNP2(i){window._np2Comps.splice(i,1);renderNP2Comps();}

async function guardarProducto(){
  const nom=document.getElementById('np2_nom').value.trim();
  if(!nom){showToast('Ingresá un nombre','warning');return;}
  try {
    await apiFetch('/api/productos',{method:'POST',body:{nombre:nom,precio:parseFloat(document.getElementById('np2_precio').value)||0,componentes:window._np2Comps}});
    await loadAll();
    closeModal();
    showToast('Producto creado','success');
  } catch(e){ showToast('Error al crear','error'); }
}

// Inicio
loadAll();
</script>
